<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#178F3E">
    <meta name="author" content="Escola de Pais Online">
    <!-- Personalizar a diretiva robots conforme a finalidade da página. -->
    <meta name="robots" content="index, follow">

    <!-- SEO -->
    <!-- Personalizar o title em cada página. -->
    <title>Título da página | Escola de Pais Online</title>
    <!-- Personalizar a description em cada página. -->
    <meta
      name="description"
      content="Descrição da página da Escola de Pais Online."
    >
    <!-- Personalizar a URL canonical em cada página. -->
    <link rel="canonical" href="https://escoladepaisonline.com.br/">

    <!-- Open Graph -->
    <!-- Personalizar og:type quando a página exigir outro tipo, como article. -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Escola de Pais Online">
    <!-- Personalizar og:title em cada página. -->
    <meta property="og:title" content="Título da página | Escola de Pais Online">
    <!-- Personalizar og:description em cada página. -->
    <meta
      property="og:description"
      content="Descrição da página da Escola de Pais Online."
    >
    <!-- Personalizar og:url em cada página. -->
    <meta property="og:url" content="https://escoladepaisonline.com.br/">
    <!-- Personalizar og:image e og:image:alt em cada página. -->
    <meta
      property="og:image"
      content="https://escoladepaisonline.com.br/caminho/para/imagem-social.jpg"
    >
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Descrição da imagem social da página.">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <!-- Personalizar twitter:title em cada página. -->
    <meta name="twitter:title" content="Título da página | Escola de Pais Online">
    <!-- Personalizar twitter:description em cada página. -->
    <meta
      name="twitter:description"
      content="Descrição da página da Escola de Pais Online."
    >
    <!-- Personalizar twitter:image e twitter:image:alt em cada página. -->
    <meta
      name="twitter:image"
      content="https://escoladepaisonline.com.br/caminho/para/imagem-social.jpg"
    >
    <meta name="twitter:image:alt" content="Descrição da imagem social da página.">

    <!-- ==========================================================
     FAVICONS
     Utilizar a mesma identidade visual em todas as páginas.
========================================================== -->

<link rel="icon" href="/assets/icons/favicon.ico" sizes="any">

<link rel="icon"
      type="image/png"
      sizes="96x96"
      href="/assets/icons/favicon-96x96.png">

<link rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/icons/apple-touch-icon.png">

<link rel="manifest" href="/site.webmanifest">

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/global.css">
    <!-- CSS específico da página -->
  </head>
  <body>
    <a class="skip-link" href="#conteudo-principal">
      Pular para o conteúdo principal
    </a>

    <div class="wrapper">
      <!-- Header -->

      <main class="site-main" id="conteudo-principal">
        <!-- Conteúdo específico -->
      </main>

      <!-- Footer -->
    </div>

    <script src="/assets/js/main.js" defer></script>
  </body>
</html>
